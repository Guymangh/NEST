<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/images/logo.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wallet – LogNest</title>
  <meta name="description" content="Add funds or view your deposit history." />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <script src="js/toast.js"></script>
  <script src="js/config.js"></script>
  <script src="js/nav.js"></script>
  <style>
    .wallet-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1.25rem;
      max-width: 600px;
      margin-top: 2.5rem;
    }
    @media (max-width: 500px) { .wallet-grid { grid-template-columns: 1fr; } }

    .wallet-nav-card {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 1rem;
      padding: 2rem 1.75rem;
      background: var(--bg-card);
      border: 2px solid var(--border-soft);
      border-radius: 18px;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.22s;
      box-shadow: var(--shadow-soft);
    }
    .wallet-nav-card:hover {
      border-color: var(--primary-deep);
      background: var(--bg-accent);
      transform: translateY(-3px);
      box-shadow: 0 8px 28px rgba(13,79,79,0.14);
    }
    .wnc-icon {
      width: 52px; height: 52px; border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.6rem;
      background: var(--bg-accent);
      border: 1px solid var(--border-soft);
      transition: background 0.22s;
    }
    .wallet-nav-card:hover .wnc-icon {
      background: rgba(13,79,79,0.12);
    }
    .wnc-body { display: flex; flex-direction: column; gap: 0.2rem; }
    .wnc-label {
      font-size: 0.72rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: .08em;
      color: var(--text-muted);
    }
    .wnc-title {
      font-size: 1.15rem; font-weight: 800; color: var(--text-main);
    }
    .wnc-desc {
      font-size: 0.82rem; color: var(--text-muted); line-height: 1.5; margin-top: 0.25rem;
    }
    .wnc-arrow {
      margin-top: auto;
      font-size: 0.85rem; font-weight: 700;
      color: var(--primary-deep); opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
    }
    .wallet-nav-card:hover .wnc-arrow { opacity: 1; transform: translateX(4px); }
  </style>
</head>
<body data-require-auth="true">
  <header class="header">
    <div class="container nav-container">
      <a href="index.html" class="logo"><img src="images/logo.png" alt="Logo" class="nav-logo" onerror="this.style.display='none'" /></a>
      <nav><ul class="nav-list" id="main-nav"></ul></nav>
    </div>
  </header>

  <main class="main-content container">
    <div data-fm="fadeIn">
      <h1 style="font-size:2.25rem;font-weight:800;margin-bottom:0.5rem;">Wallet</h1>
      <p style="color:var(--text-muted);">Add funds or view your deposit history.</p>

      <div class="wallet-grid">

        <a href="add-funds.html" class="wallet-nav-card">
          <div class="wnc-icon">💳</div>
          <div class="wnc-body">
            <span class="wnc-label">Action</span>
            <span class="wnc-title">Add Funds</span>
            <span class="wnc-desc">Deposit cryptocurrency and get your balance credited automatically.</span>
          </div>
          <span class="wnc-arrow">Go →</span>
        </a>

        <a href="deposit-history.html" class="wallet-nav-card">
          <div class="wnc-icon">📋</div>
          <div class="wnc-body">
            <span class="wnc-label">History</span>
            <span class="wnc-title">Deposit Logs</span>
            <span class="wnc-desc">View all your past deposits and their current status.</span>
          </div>
          <span class="wnc-arrow">Go →</span>
        </a>

      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="container"><p>&copy; 2026 LogNest. All rights reserved.</p></div>
  </footer>
</body>
</html>
