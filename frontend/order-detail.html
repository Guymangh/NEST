<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/images/logo.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Order Details – LogNest</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <script src="js/toast.js"></script>
  <script src="js/config.js"></script>
  <script src="js/nav.js"></script>
  <style>
    /* ── Credential box ── */
    .cred-wrapper {
      position: relative;
      border-radius: 10px;
      overflow: hidden;
      background: #0d1117;
      border: 1px solid #2a4a3a;
      min-height: 160px;
    }

    /* Canvas fills the box — text is pixels, not DOM nodes */
    #cred-canvas {
      display: none;
      width: 100%;
      border-radius: 10px;
    }

    /* Blur overlay — shown by default */
    .cred-blur-overlay {
      position: absolute;
      inset: 0;
      background: rgba(13, 17, 23, 0.6);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.85rem;
      cursor: pointer;
      transition: background 0.2s;
      z-index: 3;
      min-height: 160px;
    }
    .cred-blur-overlay:hover { background: rgba(13,17,23,0.5); }
    .reveal-icon { font-size: 2.5rem; }
    .reveal-label {
      font-size: 0.9rem; font-weight: 700; color: #58d68d;
      background: rgba(88, 214, 141, 0.12);
      border: 1px solid rgba(88, 214, 141, 0.3);
      padding: 0.55rem 1.4rem; border-radius: 8px;
      transition: background 0.2s;
    }
    .cred-blur-overlay:hover .reveal-label { background: rgba(88,214,141,0.22); }
    .reveal-sub { font-size: 0.75rem; color: rgba(255,255,255,0.4); }

    /* Loading spinner inside box */
    .cred-loading {
      display: none;
      align-items: center; justify-content: center;
      gap: 0.75rem; min-height: 160px; color: #58d68d; font-size: 0.88rem;
    }
    .spinner {
      width: 20px; height: 20px;
      border: 2px solid rgba(88,214,141,0.2);
      border-top-color: #58d68d;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Actions bar under canvas */
    .cred-actions {
      display: none; gap: 0.65rem; margin-top: 0.75rem; flex-wrap: wrap;
    }
    .copy-all-btn {
      background: rgba(88,214,141,0.12); border: 1px solid rgba(88,214,141,0.3);
      color: #58d68d; padding: 0.45rem 1.1rem; border-radius: 7px;
      font-size: 0.82rem; font-weight: 700; cursor: pointer; transition: background 0.2s;
      font-family: inherit;
    }
    .copy-all-btn:hover { background: rgba(88,214,141,0.22); }
    .hide-btn {
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.45); padding: 0.45rem 1.1rem; border-radius: 7px;
      font-size: 0.82rem; font-weight: 700; cursor: pointer; transition: background 0.2s;
      font-family: inherit;
    }
    .hide-btn:hover { background: rgba(255,255,255,0.1); }
  </style>
</head>
<body data-require-auth="true">
  <header class="header">
    <div class="container nav-container">
      <a href="index.html" class="logo">
        <img src="images/logo.png" alt="Logo" class="nav-logo" onerror="this.style.display='none'" />
      </a>
      <nav><ul class="nav-list" id="main-nav"></ul></nav>
    </div>
  </header>

  <main class="main-content page-tight container" style="max-width:780px;">
    <nav style="font-size:0.85rem; color:var(--text-muted); margin-bottom:1.5rem;">
      <a href="index.html" style="color:var(--text-muted);">Home</a>
      <span style="margin:0 0.5rem;">/</span>
      <a href="orders.html" style="color:var(--text-muted);">My Orders</a>
      <span style="margin:0 0.5rem;">/</span>
      <span id="breadcrumb-id" style="color:var(--primary-deep); font-weight:600;">Order Details</span>
    </nav>
    <div id="page-content">
      <div style="text-align:center; padding:4rem; color:var(--text-muted);">Loading order...</div>
    </div>
  </main>

  <footer class="footer">
    <div class="container"><p>&copy; 2026 LogNest. All rights reserved.</p></div>
  </footer>

  <script>
    const API_BASE = window.API_BASE || 'http://localhost:5000/api';

    // Stored in closure — never in the DOM, never in a global
    let _rawCredentials = null;

    // ── Decode base64 from server ─────────────────────────────────────────────
    function b64Decode(str) {
      try { return decodeURIComponent(escape(atob(str))); }
      catch { return str; }
    }

    // ── Render credentials onto a canvas (text is pixels, not DOM text) ───────
    function renderToCanvas(text) {
      const canvas  = document.getElementById('cred-canvas');
      const padding = 20;
      const lineH   = 22;
      const fontSize = 13;
      const font    = `${fontSize}px 'Courier New', Courier, monospace`;

      // Measure lines
      const ctx0 = canvas.getContext('2d');
      ctx0.font  = font;
      const maxW = canvas.offsetWidth || 700;
      const usableW = maxW - padding * 2;

      // Word-wrap each line
      const inputLines = text.split('\n');
      const drawLines  = [];
      for (const line of inputLines) {
        if (ctx0.measureText(line).width <= usableW) {
          drawLines.push(line);
        } else {
          // Break long lines
          let cur = '';
          for (const word of line.split(' ')) {
            const test = cur ? cur + ' ' + word : word;
            if (ctx0.measureText(test).width <= usableW) { cur = test; }
            else { if (cur) drawLines.push(cur); cur = word; }
          }
          if (cur) drawLines.push(cur);
        }
      }

      // Size canvas
      const totalH = drawLines.length * lineH + padding * 2;
      canvas.width  = maxW;
      canvas.height = totalH;

      // Draw background
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#0d1117';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Draw each line of text
      ctx.font      = font;
      ctx.fillStyle = '#58d68d';
      ctx.textBaseline = 'top';
      drawLines.forEach((line, i) => {
        ctx.fillText(line, padding, padding + i * lineH);
      });

      canvas.style.display = 'block';
    }

    // ── Reveal: two-step token flow ────────────────────────────────────────────
    // Step 1: POST /request-credentials → get single-use 60s token
    // Step 2: GET  /credentials?t=TOKEN  → redeem token, get b64 credentials
    async function revealCredentials() {
      if (_rawCredentials) { showCanvas(); return; }

      const jwt    = localStorage.getItem('token');
      const id     = new URLSearchParams(window.location.search).get('id');
      const overlay = document.getElementById('cred-overlay');
      const loading = document.getElementById('cred-loading');

      if (overlay) overlay.style.display = 'none';
      if (loading) loading.style.display = 'flex';

      try {
        // ── Step 1: Request a one-time reveal token ─────────────────────────
        const tokenRes  = await fetch(`${API_BASE}/orders/${id}/request-credentials`, {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${jwt}`, 'Content-Type': 'application/json' }
        });
        const tokenData = await tokenRes.json();

        if (!tokenData.success) {
          toast(tokenData.message || 'Could not request credentials.', 'error');
          if (overlay) overlay.style.display = 'flex';
          if (loading) loading.style.display = 'none';
          return;
        }

        const revealToken  = tokenData.token;       // single-use, 60s
        const expiresIn    = tokenData.expires_in;  // seconds

        // ── Step 2: Immediately redeem the token ─────────────────────────────
        const credRes  = await fetch(`${API_BASE}/orders/${id}/credentials?t=${revealToken}`, {
          headers: { 'Authorization': `Bearer ${jwt}` }
        });
        const credData = await credRes.json();

        if (!credData.success) {
          toast(credData.message || 'Could not load credentials.', 'error');
          if (overlay) overlay.style.display = 'flex';
          if (loading) loading.style.display = 'none';
          return;
        }

        // Store in closure — never in DOM, never in a global
        _rawCredentials = b64Decode(credData.data);
        showCanvas();

      } catch (err) {
        console.error(err);
        toast('Server error. Please try again.', 'error');
        if (overlay) overlay.style.display = 'flex';
        if (loading) loading.style.display = 'none';
      }
    }

    function showCanvas() {
      const loading = document.getElementById('cred-loading');
      const actions = document.getElementById('cred-actions');
      if (loading) loading.style.display = 'none';
      renderToCanvas(_rawCredentials);
      if (actions) actions.style.display = 'flex';
    }

    // ── Re-blur: hide canvas, show overlay again ──────────────────────────────
    function hideCredentials() {
      const canvas  = document.getElementById('cred-canvas');
      const overlay = document.getElementById('cred-overlay');
      const actions = document.getElementById('cred-actions');
      if (canvas)  canvas.style.display = 'none';
      if (overlay) overlay.style.display = 'flex';
      if (actions) actions.style.display = 'none';
    }

    // ── Copy credentials to clipboard (from closure var, not DOM) ────────────
    function copyCredentials() {
      if (!_rawCredentials) { toast('Reveal credentials first.', 'warning'); return; }
      navigator.clipboard.writeText(_rawCredentials).then(() => {
        toast('Credentials copied to clipboard!', 'success');
      }).catch(() => toast('Copy failed. Please select manually.', 'error'));
    }

    // ── Load order metadata (NO credentials in this response) ─────────────────
    async function loadOrder() {
      const token = localStorage.getItem('token');
      if (!token) { window.location.href = 'login.html'; return; }

      const id = new URLSearchParams(window.location.search).get('id');
      if (!id) {
        document.getElementById('page-content').innerHTML =
          '<p style="color:red;text-align:center;">No order ID specified.</p>';
        return;
      }

      document.getElementById('breadcrumb-id').textContent = '#' + id.substring(0, 8).toUpperCase();

      try {
        const res  = await fetch(`${API_BASE}/orders/${id}`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        const data = await res.json();

        if (!data.success) {
          document.getElementById('page-content').innerHTML =
            `<p style="color:red;text-align:center;">${data.message || 'Order not found.'}</p>`;
          return;
        }

        const o = data.order;
        const statusColor = {
          completed: '#16a34a', pending: '#d97706',
          refunded:  '#6366f1', cancelled: '#b91c1c'
        };

        // ── Build credential section based on order status ───────────────────
        let credHtml = '';

        if (o.status === 'completed') {
          // Show reveal box — credentials fetched separately on click
          credHtml = `
          <div class="card" style="margin-bottom:1.5rem;">
            <h3 style="font-size:1.05rem; margin-bottom:0.5rem; color:var(--primary-deep);">🔐 Delivered Credentials</h3>
            <p style="color:var(--text-muted); font-size:0.82rem; margin-bottom:1rem;">
              Click to reveal your purchased access data. Keep this private — do not share.
            </p>
            <div class="cred-wrapper" id="cred-wrapper">
              <!-- Loading spinner (hidden by default) -->
              <div class="cred-loading" id="cred-loading">
                <div class="spinner"></div>
                <span>Loading credentials…</span>
              </div>
              <!-- Canvas: credentials drawn as pixels — not readable via DOM inspection -->
              <canvas id="cred-canvas"></canvas>
              <!-- Blur overlay — default visible -->
              <div class="cred-blur-overlay" id="cred-overlay" onclick="revealCredentials()">
                <div class="reveal-icon">🔒</div>
                <div class="reveal-label">Click to Reveal Credentials</div>
                <div class="reveal-sub">Requires a fresh authenticated request</div>
              </div>
            </div>
            <div class="cred-actions" id="cred-actions">
              <button class="copy-all-btn" onclick="copyCredentials()">📋 Copy All</button>
              <button class="hide-btn" onclick="hideCredentials()">🔒 Hide</button>
            </div>
          </div>`;

        } else if (o.status === 'refunded') {
          credHtml = `
          <div class="card" style="margin-bottom:1.5rem; border-left:4px solid #ef4444;">
            <div style="display:flex;align-items:flex-start;gap:1rem;">
              <div style="font-size:2rem;flex-shrink:0;">↩</div>
              <div>
                <h3 style="font-size:1rem;font-weight:700;color:#b91c1c;margin-bottom:0.4rem;">Refund Issued</h3>
                <p style="font-size:0.875rem;color:var(--text-muted);line-height:1.6;">
                  A full refund of <strong style="color:#b91c1c;">$${parseFloat(o.total).toFixed(2)}</strong>
                  has been issued to your account balance.
                  Access to the purchased log has been permanently revoked.
                </p>
              </div>
            </div>
          </div>`;

        } else {
          credHtml = `
          <div class="card" style="margin-bottom:1.5rem; text-align:center; padding:2rem;">
            <div style="font-size:2rem; margin-bottom:0.5rem;">⏳</div>
            <p style="color:var(--text-muted);">Credentials are being prepared. Please refresh in a moment.</p>
          </div>`;
        }

        document.getElementById('page-content').innerHTML = `
          <div style="display:flex; gap:0.75rem; flex-wrap:wrap; margin-bottom:1.5rem;">
            <a href="orders.html" class="btn btn-outline" style="font-size:0.85rem;padding:0.5rem 1rem;">← Back to Orders</a>
            <a href="store.html"  class="btn btn-primary" style="font-size:0.85rem;padding:0.5rem 1rem;">Continue Shopping</a>
          </div>

          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;flex-wrap:wrap;gap:1rem;">
            <div>
              <h1 style="font-size:1.5rem;color:var(--primary-deep);">Order #${o.id.substring(0,8).toUpperCase()}</h1>
              <p style="color:var(--text-muted);margin-top:0.2rem;font-size:0.875rem;">
                Placed on ${new Date(o.created_at).toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'})}
              </p>
            </div>
            <span style="background:${statusColor[o.status]||'#888'}22;color:${statusColor[o.status]||'#888'};border:1px solid ${statusColor[o.status]||'#888'}44;border-radius:20px;padding:0.35rem 0.9rem;font-weight:700;font-size:0.82rem;text-transform:capitalize;">
              ${o.status}
            </span>
          </div>

          ${credHtml}
        `;

      } catch (err) {
        console.error(err);
        document.getElementById('page-content').innerHTML =
          '<p style="color:red;text-align:center;">Failed to load order. Make sure the server is running.</p>';
      }
    }

    loadOrder();
  </script>
</body>
</html>
