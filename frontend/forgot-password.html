<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/images/logo.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password – LogNest</title>
  <meta name="description" content="Recover your password for your LogNest account." />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://unpkg.com/framer-motion/dist/framer-motion.umd.js"></script>
  <script src="js/toast.js"></script>
  <script defer src="js/auth.js"></script>
  <script src="js/config.js"></script>
  <script src="js/nav.js"></script>
</head>
<body>
  <div class="auth-container">
    <div class="card auth-card" data-fm="slideUp">
      <div class="auth-header">
        <a href="index.html" class="logo" style="margin-bottom: 1rem; justify-content: center;">
          <img src="images/logo.png" alt="Logo" class="nav-logo" onerror="this.style.display='none'" />
         
        </a>
        <h1>Reset Password</h1>
        <p>Enter your email to receive a recovery link</p>
      </div>
      <form id="forgot-password-form">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" class="form-control" placeholder="you@example.com" required />
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Send Reset Link</button>
      </form>
      <p style="text-align: center; margin-top: 1.5rem; font-size: 0.9rem; color: var(--text-muted);">
        Remembered your password? <a href="login.html">Back to Login</a>
      </p>
    </div>
  </div>
</body>
</html>
