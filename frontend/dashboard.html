<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/images/logo.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard – LogNest</title>
  <meta name="description" content="Your LogNest account dashboard — balance, orders, and quick actions." />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <script src="js/config.js"></script>
  <script src="js/nav.js"></script>
  <style>
    /* ── Layout ── */
    .dash-grid {
      display: grid;
      grid-template-columns: 1fr 300px;
      gap: 1.25rem;
      align-items: start;
    }
    .dash-left  { display: flex; flex-direction: column; gap: 1.25rem; }
    .dash-right { display: flex; flex-direction: column; gap: 1.25rem; }

    /* ── Welcome Banner ── */
    .welcome-banner {
      background: linear-gradient(135deg, var(--primary-deep) 0%, var(--primary) 100%);
      border-radius: 16px;
      padding: 1.5rem 2rem;
      display: flex; justify-content: space-between; align-items: center;
      gap: 1rem; flex-wrap: wrap;
      position: relative; overflow: hidden;
    }
    .welcome-banner::before {
      content: '';
      position: absolute; top: -40%; right: -5%;
      width: 280px; height: 280px;
      background: radial-gradient(circle, rgba(255,255,255,0.08), transparent 70%);
      border-radius: 50%;
        <!-- ── 3. Quick Actions ──────────────────────────────── -->
        <div>
          <div class="section-title">Quick Actions</div>
          <div class="actions-grid">
            <a href="store.html" class="action-card">
              <div class="action-icon">🏪</div>
              <div>
                <div class="action-label">Browse Store</div>
                <div class="action-sub">View available logs</div>
              </div>
            </a>
            <a href="orders.html" class="action-card">
              <div class="action-icon">📦</div>
              <div>
                <div class="action-label">My Orders</div>
                <div class="action-sub">View purchase history</div>
              </div>
            </a>
            <a href="deposit.html" class="action-card">
              <div class="action-icon">💰</div>
              <div>
                <div class="action-label">Add Funds</div>
                <div class="action-sub">Top up via crypto</div>
              </div>
            </a>
            <a href="cart.html" class="action-card">
              <div class="action-icon">🛒</div>
              <div>
                <div class="action-label">Your Cart</div>
                <div class="action-sub">Review &amp; checkout</div>
              </div>
            </a>
          </div>
        </div>

      </div><!-- /.dash-left -->

      <div class="dash-right">

        <!-- ── 4. Account Info ───────────────────────────────── -->
        <div class="info-card">
          <div class="section-title">Account</div>
          <div class="info-avatar" id="account-avatar">U</div>
          <div class="info-name"  id="account-name">—</div>
          <div class="info-email" id="account-email">—</div>
          <div class="info-row">
            <span>Role</span>
            <span><span class="role-badge" id="account-role">user</span></span>
          </div>
          <div class="info-row">
            <span>Status</span>
            <span style="color:#16a34a; font-weight:700;">● Active</span>
          </div>
          <div class="info-row">
            <span>Member Since</span>
            <span id="account-since">—</span>
          </div>
        </div>

        <!-- ── 7. Security Tips ──────────────────────────────── -->
        <div class="security-card">
          <div class="section-title">Security Tips</div>
          <div class="security-item">
            <div class="security-dot">🔒</div>
            <div class="security-text">
              <strong>Never share your credentials</strong>
              <span>Keep login details private at all times.</span>
            </div>
          </div>
          <div class="security-item">
            <div class="security-dot">📧</div>
            <div class="security-text">
              <strong>Use a dedicated email</strong>
              <span>Don't use your main personal inbox.</span>
            </div>
          </div>
          <div class="security-item">
            <div class="security-dot">🚪</div>
            <div class="security-text">
              <strong>Log out after each session</strong>
              <span>Especially on shared devices.</span>
            </div>
          </div>
          <div class="security-item">
            <div class="security-dot">💾</div>
            <div class="security-text">
              <strong>Back up purchased logs</strong>
              <span>Save copies in a secure, offline location.</span>
            </div>
          </div>
        </div>

      </div><!-- /.dash-right -->
    </div><!-- /.dash-grid -->
  </main>

  <footer class="footer">
    <div class="container"><p>&copy; 2026 LogNest. All rights reserved.</p></div>
  </footer>

  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const token = localStorage.getItem('token');
      const user  = JSON.parse(localStorage.getItem('user') || 'null');
      if (!user) return;

      // ── Welcome banner
      document.getElementById('welcome-name').textContent = `Welcome back, ${user.username} 👋`;
      document.getElementById('welcome-role').textContent = user.role === 'admin' ? '🛡 Admin' : '✓ Member';
      const since = user.created_at ? new Date(user.created_at).toLocaleDateString('en-US', { month: 'long', year: 'numeric' }) : '—';
      document.getElementById('welcome-sub').textContent = `Member since ${since} · Account in good standing`;

      // ── Account info
      document.getElementById('account-avatar').textContent = (user.username || 'U').charAt(0).toUpperCase();
      document.getElementById('account-name').textContent   = user.username || '—';
      document.getElementById('account-email').textContent  = user.email    || '—';
      document.getElementById('account-role').textContent   = user.role     || 'user';
      document.getElementById('account-since').textContent  = since;

      // ── Balance stat
      const bal = parseFloat(user.balance || 0);
      document.getElementById('stat-balance').textContent = `$${bal.toFixed(2)}`;
      if (bal < 20) document.getElementById('low-balance-alert').style.display = 'flex';

      // ── Orders stats from API
      try {
        const res  = await fetch(`${window.API_BASE || 'http://localhost:5000/api'}/orders/my-orders?limit=100`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        const data = await res.json();
        if (data.success) {
          const orders = data.orders || [];
          const spent  = orders.reduce((a, o) => a + parseFloat(o.total || 0), 0);
          document.getElementById('stat-orders').textContent = orders.length;
          document.getElementById('stat-spent').textContent  = `$${spent.toFixed(2)}`;
        }
      } catch { 
        document.getElementById('stat-orders').textContent = '—';
        document.getElementById('stat-spent').textContent  = '—';
      }
    });
  </script>
</body>
</html>
