<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product Detail – LogNest</title>
  <meta name="description" content="Detailed view of a digital product, with pricing and purchase options." />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://unpkg.com/framer-motion/dist/framer-motion.umd.js"></script>
  <script defer src="js/main.js"></script>
</head>
<body data-require-auth="true">
  <header class="header">
    <div class="container nav-container">
      <a href="index.html" class="logo"><img src="css/logo.png" alt="Logo" class="nav-logo" onerror="this.style.display='none'" /></a>
      <nav>
        <ul class="nav-list">
          <li><a href="index.html">Home</a></li>
          <li><a href="store.html" class="active">Store</a></li>
          <li><a href="dashboard.html">Dashboard</a></li>
          <li><a href="login.html" class="btn btn-outline" style="padding: 0.5rem 1rem;">Login</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="main-content container">
    <a href="store.html" style="display: inline-flex; align-items: center; margin-bottom: 2rem; color: var(--text-muted); font-size: 0.9rem;">
      ← Back to Store
    </a>

    <section class="product-detail-layout" data-fm="slideUp">
      <div class="product-image">
        <span style="font-size: 6rem; color: var(--primary-deep);" id="product-icon">📦</span>
      </div>
      
      <div class="product-info">
        <div class="badge badge-primary" style="margin-bottom: 1rem;" id="product-category">Category</div>
        <h1 id="product-name">Product Name</h1>
        
        <div class="product-price" id="product-price">$0.00</div>
        
        <div class="product-meta">
          <span style="color: var(--success); font-weight: 500; display: flex; align-items: center; gap: 0.5rem;">
            <span style="width: 8px; height: 8px; background: var(--success); border-radius: 50%; display: inline-block; box-shadow: 0 0 10px var(--success);"></span>
            In Stock
          </span>
          <span style="color: var(--text-muted);" id="product-stock-count">Unlimited</span>
        </div>

        <p id="product-description" style="color: var(--text-muted); margin-bottom: 2rem; line-height: 1.8;">
          Loading product description...
        </p>

        <div style="padding: 1.5rem; background: var(--bg-accent); border: 1px solid var(--border-soft); border-radius: 12px; margin-bottom: 2rem;">
          <h3 style="font-size: 1rem; color: var(--primary-deep); margin-bottom: 0.5rem;">Instant Delivery</h3>
          <p style="font-size: 0.9rem; color: var(--text-muted);">This product will be delivered automatically to your dashboard immediately after payment.</p>
        </div>

        <button class="btn btn-primary" style="width: 100%; padding: 1rem;" onclick="purchaseProduct()">Purchase Now</button>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container">
      <p>&copy; 2026 LogNest. All rights reserved.</p>
    </div>
  </footer>
</body>
</html>
