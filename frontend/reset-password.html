<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/images/logo.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password – LogNest</title>
  <meta name="description" content="Set a new password for your LogNest account." />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <script src="js/toast.js"></script>
  <script src="js/config.js"></script>
</head>
<body>
  <div class="auth-container">
    <div class="card auth-card">
      <div class="auth-header">
        <a href="index.html" class="logo" style="margin-bottom: 1rem; justify-content: center;">
          <img src="images/logo.png" alt="Logo" class="nav-logo" onerror="this.style.display='none'" />
        </a>
        <h1>Set New Password</h1>
        <p>Enter your new password below</p>
      </div>

      <div id="reset-error" style="display:none; background:#fef2f2; color:#b91c1c; border:1px solid #fecaca;
        border-radius:8px; padding:0.75rem 1rem; margin-bottom:1rem; font-size:0.9rem; font-weight:500;"></div>

      <div id="reset-success" style="display:none; background:#f0fdf4; color:#166534; border:1px solid #bbf7d0;
        border-radius:8px; padding:0.75rem 1rem; margin-bottom:1rem; font-size:0.9rem; font-weight:500;"></div>

      <form id="reset-password-form">
        <div class="form-group">
          <label for="password">New Password</label>
          <input type="password" id="password" name="password" class="form-control"
            placeholder="Min 8 characters" required minlength="8" />
        </div>
        <div class="form-group" style="margin-top:1rem;">
          <label for="confirm-password">Confirm Password</label>
          <input type="password" id="confirm-password" name="confirm-password" class="form-control"
            placeholder="Repeat new password" required />
        </div>
        <button type="submit" id="reset-btn" class="btn btn-primary" style="width:100%; margin-top:1.25rem;">
          Reset Password
        </button>
      </form>

      <p style="text-align:center; margin-top:1.5rem; font-size:0.9rem; color:var(--text-muted);">
        <a href="login.html">← Back to Login</a>
      </p>
    </div>
  </div>

  <script>
    const API_BASE = window.__API_BASE__ || 'http://localhost:5000/api';

    // Extract token from URL query string
    const urlToken = new URLSearchParams(window.location.search).get('token');
    if (!urlToken) {
      document.getElementById('reset-error').style.display = 'block';
      document.getElementById('reset-error').textContent =
        'Invalid or missing reset token. Please request a new password reset.';
      document.getElementById('reset-password-form').style.display = 'none';
    }

    document.getElementById('reset-password-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errEl  = document.getElementById('reset-error');
      const succEl = document.getElementById('reset-success');
      errEl.style.display = 'none';
      succEl.style.display = 'none';

      const password        = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirm-password').value;

      if (password !== confirmPassword) {
        errEl.textContent = 'Passwords do not match.';
        errEl.style.display = 'block';
        return;
      }
      if (password.length < 8) {
        errEl.textContent = 'Password must be at least 8 characters.';
        errEl.style.display = 'block';
        return;
      }

      const btn = document.getElementById('reset-btn');
      btn.disabled = true;
      btn.textContent = 'Resetting…';

      try {
        const res  = await fetch(`${API_BASE}/auth/reset-password`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token: urlToken, password }),
        });
        const data = await res.json();

        if (data.success) {
          succEl.textContent = 'Password reset! Redirecting to login…';
          succEl.style.display = 'block';
          document.getElementById('reset-password-form').style.display = 'none';
          setTimeout(() => { window.location.href = 'login.html'; }, 2500);
        } else {
          errEl.textContent = data.message || 'Reset failed. The link may have expired.';
          errEl.style.display = 'block';
          btn.disabled = false;
          btn.textContent = 'Reset Password';
        }
      } catch {
        errEl.textContent = 'Cannot connect to server. Please try again.';
        errEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Reset Password';
      }
    });
  </script>
</body>
</html>
