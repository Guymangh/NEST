<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/images/logo.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Deposit History – LogNest</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <script src="js/toast.js"></script>
  <script src="js/config.js"></script>
  <script src="js/nav.js"></script>
  <style>
    :root { --radius-xl: 24px; --radius-lg: 16px; --radius-md: 12px; }

    .dh-page {
      min-height: 80vh;
      padding: 3rem 1rem 4rem;
    }

    /* ── Hero ── */
    .dh-hero {
      text-align: center;
      margin-bottom: 2.5rem;
    }
    .dh-hero-badge {
      display: inline-flex; align-items: center; gap: 0.4rem;
      background: var(--bg-accent); border: 1px solid var(--border-soft);
      border-radius: 20px; padding: 0.35rem 1rem;
      font-size: 0.75rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: .08em;
      color: var(--primary-deep); margin-bottom: 1rem;
    }
    .dh-hero h1 {
      font-size: 2.5rem; font-weight: 900; line-height: 1.1; margin-bottom: 0.5rem;
      background: linear-gradient(135deg, var(--text-main) 40%, var(--primary-deep));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .dh-hero p { color: var(--text-muted); font-size: 0.95rem; }

    /* ── Stats bar ── */
    .dh-stats {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 1rem; max-width: 680px; margin: 0 auto 1.75rem;
    }
    @media(max-width:480px){ .dh-stats{ grid-template-columns: 1fr; gap:.65rem; } }
    .dh-stat {
      background: var(--bg-card); border: 1px solid var(--border-soft);
      border-radius: var(--radius-lg); padding: 1.2rem 1.25rem;
      text-align: center; box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    .dh-stat .sv {
      font-size: 1.55rem; font-weight: 900; color: var(--text-main);
      display: block; margin-bottom: 0.2rem;
    }
    .dh-stat .sv.green  { color: #16a34a; }
    .dh-stat .sv.amber  { color: #d97706; }
    .dh-stat .sv.teal   { color: var(--primary-deep); }
    .dh-stat .sl { font-size: 0.72rem; text-transform: uppercase; letter-spacing: .07em; font-weight: 700; color: var(--text-muted); }

    /* ── Table card ── */
    .dh-card {
      max-width: 680px; margin: 0 auto;
      background: var(--bg-card); border: 1px solid var(--border-soft);
      border-radius: var(--radius-xl);
      box-shadow: 0 20px 60px rgba(0,0,0,0.14);
      overflow: hidden;
    }
    .dh-card-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.25rem 1.5rem; border-bottom: 1px solid var(--border-soft);
      background: var(--bg-main);
    }
    .dh-card-header h2 { font-size: 0.92rem; font-weight: 700; }
    .dh-add-btn {
      display: inline-flex; align-items: center; gap: 0.4rem;
      background: var(--primary-deep); color: #fff;
      padding: 0.45rem 1rem; border-radius: 8px;
      font-size: 0.8rem; font-weight: 700; text-decoration: none;
      transition: opacity .18s;
    }
    .dh-add-btn:hover { opacity: 0.88; }

    /* ── DESKTOP TABLE ── */
    .dh-table { width: 100%; border-collapse: collapse; }
    .dh-table th {
      text-align: left; padding: 0.8rem 1.5rem;
      font-size: 0.7rem; text-transform: uppercase; letter-spacing: .07em;
      color: var(--text-muted); font-weight: 700;
      border-bottom: 1px solid var(--border-soft);
    }
    .dh-table td {
      padding: 1rem 1.5rem; font-size: 0.875rem;
      border-bottom: 1px solid var(--border-soft); vertical-align: middle;
    }
    .dh-table tbody tr:last-child td { border-bottom: none; }
    .dh-table tbody tr { transition: background .14s; }
    .dh-table tbody tr:hover td { background: var(--bg-accent); }

    /* ── MOBILE CARDS (< 580px) ── */
    @media(max-width:579px) {
      .dh-table thead { display: none; }
      .dh-table, .dh-table tbody, .dh-table tr, .dh-table td { display: block; width: 100%; box-sizing: border-box; }
      .dh-table tbody tr {
        padding: 1rem 1.25rem;
        border-bottom: 1px solid var(--border-soft);
        display: grid;
        grid-template-columns: 1fr 1fr;
        grid-template-rows: auto auto;
        gap: 0.5rem 1rem;
        align-items: center;
      }
      .dh-table tbody tr:last-child { border-bottom: none; }
      .dh-table td { padding: 0; border: none; }
      .dh-table td::before {
        content: attr(data-label);
        font-size: 0.68rem; text-transform: uppercase; letter-spacing: .07em;
        font-weight: 700; color: var(--text-muted); display: block; margin-bottom: 2px;
      }
      /* Date — top left, Amount — top right */
      .dh-table td[data-label="Date"]   { grid-column: 1; grid-row: 1; }
      .dh-table td[data-label="Amount"] { grid-column: 2; grid-row: 1; text-align: right; }
      .dh-table td[data-label="Coin"]   { grid-column: 1; grid-row: 2; }
      .dh-table td[data-label="Status"] { grid-column: 2; grid-row: 2; text-align: right; }
      .dh-table td[data-label="Amount"]::before { text-align: right; }
      .dh-table td[data-label="Status"]::before { text-align: right; }
    }

    /* ── Badges ── */
    .dep-badge {
      display: inline-flex; align-items: center; gap: 0.25rem;
      padding: 0.28rem 0.75rem; border-radius: 20px;
      font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; white-space: nowrap;
    }
    .dep-badge.pending  { background: rgba(217,119,6,0.12);  color: #d97706; border: 1px solid rgba(217,119,6,0.2); }
    .dep-badge.approved { background: rgba(22,163,74,0.12);  color: #16a34a; border: 1px solid rgba(22,163,74,0.2); }
    .dep-badge.rejected { background: rgba(220,38,38,0.1);   color: #dc2626; border: 1px solid rgba(220,38,38,0.18); }

    .coin-pill {
      display: inline-flex; align-items: center; gap: 0.3rem;
      background: var(--bg-accent); border: 1px solid var(--border-soft);
      border-radius: 6px; padding: 0.2rem 0.6rem;
      font-size: 0.78rem; font-weight: 700; color: var(--text-main); white-space: nowrap;
    }

    /* ── Pagination ── */
    .dh-pag {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1rem 1.5rem; border-top: 1px solid var(--border-soft);
      background: var(--bg-main); flex-wrap: wrap; gap: .65rem;
    }
    .dh-pag-info { font-size: 0.8rem; color: var(--text-muted); font-weight: 500; }
    .dh-pag-btns { display: flex; gap: .45rem; }
    .dh-pag-btn {
      padding: 0.45rem 1rem; border: 1px solid var(--border-soft); border-radius: 8px;
      background: var(--bg-card); color: var(--text-main);
      font-size: 0.8rem; font-weight: 600; cursor: pointer; transition: all .18s;
    }
    .dh-pag-btn:hover:not(:disabled) { border-color: var(--primary-deep); color: var(--primary-deep); }
    .dh-pag-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    /* ── Empty state ── */
    .empty-state {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: 4rem 2rem; text-align: center; gap: 1rem;
    }
    .empty-state .e-icon { font-size: 3.5rem; filter: grayscale(1); opacity: .35; }
    .empty-state h3 { font-size: 1rem; font-weight: 700; }
    .empty-state p { color: var(--text-muted); font-size: 0.875rem; max-width: 280px; }
    .empty-cta {
      display: inline-flex; align-items: center; gap: 0.4rem;
      background: var(--primary-deep); color: #fff;
      padding: 0.65rem 1.5rem; border-radius: 10px;
      font-size: 0.88rem; font-weight: 700; text-decoration: none; transition: opacity .2s;
    }
    .empty-cta:hover { opacity: .88; }
  </style>
</head>
<body data-require-auth="true">
  <header class="header">
    <div class="container nav-container">
      <a href="index.html" class="logo"><img src="images/logo.png" alt="Logo" class="nav-logo" onerror="this.style.display='none'" /></a>
      <nav><ul class="nav-list" id="main-nav"></ul></nav>
    </div>
  </header>

  <main class="main-content container">
    <div class="dh-page" data-fm="fadeIn">

      <div class="dh-hero">
        <div class="dh-hero-badge">📋 Transaction History</div>
        <h1>Deposit History</h1>
        <p>All your past deposits and their current status.</p>
      </div>

      <!-- Stats -->
      <div class="dh-stats" id="dh-stats">
        <div class="dh-stat">
          <span class="sv teal" id="stat-total">—</span>
          <span class="sl">Total Deposits</span>
        </div>
        <div class="dh-stat">
          <span class="sv green" id="stat-approved">—</span>
          <span class="sl">Approved</span>
        </div>
        <div class="dh-stat">
          <span class="sv amber" id="stat-pending">—</span>
          <span class="sl">Pending</span>
        </div>
      </div>

      <!-- Table card -->
      <div class="dh-card">
        <div class="dh-card-header">
          <h2>All Deposits</h2>
          <a href="add-funds.html" class="dh-add-btn">+ Add Funds</a>
        </div>

        <table class="dh-table">
          <thead>
            <tr>
              <th>Date</th>
              <th>Amount</th>
              <th>Coin</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="hist-body">
            <tr><td colspan="4">
              <div class="empty-state">
                <div class="e-icon">⏳</div>
                <p>Loading your deposits…</p>
              </div>
            </td></tr>
          </tbody>
        </table>

        <div class="dh-pag" id="dh-pag" style="display:none;">
          <span class="dh-pag-info" id="pag-info">—</span>
          <div class="dh-pag-btns">
            <button class="dh-pag-btn" id="pag-prev" onclick="loadHistory(currentPage-1)">← Prev</button>
            <button class="dh-pag-btn" id="pag-next" onclick="loadHistory(currentPage+1)">Next →</button>
          </div>
        </div>
      </div>

    </div>
  </main>

  <footer class="footer">
    <div class="container"><p>&copy; 2026 LogNest. All rights reserved.</p></div>
  </footer>

  <script>
    const API_BASE  = window.__API_BASE__ || window.API_BASE || 'http://localhost:5000/api';
    const PAGE_SIZE = 8;
    let currentPage = 1, allLoaded = [];
    const ICONS = { BTC:'₿', USDT:'₮', TRX:'🔴', LTC:'🥈', ETH:'Ξ' };

    function coinPill(notes, method) {
      const m    = (notes || '').match(/Crypto deposit - (\w+)/);
      const coin = m ? m[1] : (method === 'manual' ? 'Manual' : method.toUpperCase());
      return `<span class="coin-pill">${ICONS[coin]||'💰'} ${coin}</span>`;
    }

    function updateStats(deps) {
      document.getElementById('stat-total').textContent    = deps.length;
      document.getElementById('stat-approved').textContent = deps.filter(d=>d.status==='approved').length;
      document.getElementById('stat-pending').textContent  = deps.filter(d=>d.status==='pending').length;
    }

    async function loadHistory(page = 1) {
      currentPage = page;
      const token = localStorage.getItem('token');
      if (!token) return;
      const tbody = document.getElementById('hist-body');
      tbody.innerHTML = `<tr><td colspan="4"><div class="empty-state"><div class="e-icon">⏳</div><p>Loading…</p></div></td></tr>`;

      try {
        const res  = await fetch(`${API_BASE}/deposits/my-deposits?page=${page}&limit=${PAGE_SIZE}`, {
          headers: { Authorization: `Bearer ${token}` },
        });
        const data = await res.json();

        if (!data.success || !data.deposits.length) {
          tbody.innerHTML = `<tr><td colspan="4">
            <div class="empty-state">
              <div class="e-icon">📭</div>
              <h3>No deposits yet</h3>
              <p>Make your first crypto deposit to get started.</p>
              <a href="add-funds.html" class="empty-cta">💳 Add Funds</a>
            </div></td></tr>`;
          document.getElementById('dh-pag').style.display = 'none';
          document.getElementById('stat-total').textContent    = '0';
          document.getElementById('stat-approved').textContent = '0';
          document.getElementById('stat-pending').textContent  = '0';
          return;
        }

        allLoaded = data.deposits;
        updateStats(data.deposits);
        const total = data.total || data.deposits.length;
        const pages = Math.ceil(total / PAGE_SIZE);

        tbody.innerHTML = data.deposits.map(d => {
          const date = new Date(d.created_at).toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
          return `<tr>
            <td data-label="Date"   style="color:var(--text-muted);font-size:.82rem;white-space:nowrap;">${date}</td>
            <td data-label="Amount"><strong style="color:var(--primary-deep);font-size:.95rem;">$${parseFloat(d.amount).toFixed(2)}</strong></td>
            <td data-label="Coin"  >${coinPill(d.notes, d.method)}</td>
            <td data-label="Status"><span class="dep-badge ${d.status}">${d.status === 'approved' ? '✓' : d.status === 'pending' ? '⏳' : '✕'} ${d.status}</span></td>
          </tr>`;
        }).join('');

        const pagEl   = document.getElementById('dh-pag');
        const prevBtn = document.getElementById('pag-prev');
        const nextBtn = document.getElementById('pag-next');
        const infoEl  = document.getElementById('pag-info');
        pagEl.style.display  = 'flex';
        infoEl.textContent   = pages > 1 ? `Page ${page} of ${pages} · ${total} deposits` : `${total} deposit${total!==1?'s':''}`;
        prevBtn.disabled     = page <= 1;
        nextBtn.disabled     = page >= pages;
        prevBtn.style.display = pages > 1 ? '' : 'none';
        nextBtn.style.display = pages > 1 ? '' : 'none';

      } catch {
        tbody.innerHTML = `<tr><td colspan="4"><div class="empty-state"><div class="e-icon">⚠️</div><h3>Error loading</h3><p>Could not load deposit history.</p></div></td></tr>`;
      }
    }

    loadHistory(1);
  </script>
</body>
</html>
