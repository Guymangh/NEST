<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="../images/logo.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Add Product – LogNest Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/admin.css" />
  <script src="../js/config.js"></script>
  <script defer src="../js/admin.js"></script>
</head>
<body>
  <div class="a-shell">
    <aside class="a-sidebar">
      <div class="a-brand">
        <img src="../images/logo.png" alt="LogNest" style="height:38px; width:auto; object-fit:contain;" /><span class="a-brand-tag" style="margin-left:0.4rem;">Admin</span>
      </div>
      <nav class="a-nav">
        <span class="a-nav-label">Main</span>
        <a href="/admin" class="a-nav-item"><span class="a-nav-icon">📊</span> Dashboard</a>
        <span class="a-nav-label">Products</span>
        <a href="/admin/add-product" class="a-nav-item active"><span class="a-nav-icon">➕</span> Add Product</a>
        <a href="/admin/existing-products" class="a-nav-item"><span class="a-nav-icon">📂</span> All Products</a>
        <span class="a-nav-label">Management</span>
        <a href="/admin/orders" class="a-nav-item"><span class="a-nav-icon">🛒</span> Orders</a>
        
        <a href="/admin/refunded-logs" class="a-nav-item"><span class="a-nav-icon">↩️</span> Refunded Logs</a>
        <a href="/admin/users" class="a-nav-item"><span class="a-nav-icon">👥</span> Users</a>
        <a href="/admin/deposits" class="a-nav-item"><span class="a-nav-icon">💰</span> Deposits</a>
        <span class="a-nav-label">System</span>
        <a href="/admin/settings" class="a-nav-item"><span class="a-nav-icon">⚙️</span> Settings</a>
      </nav>
      <div class="a-sidebar-footer">
        <a href="#" id="admin-logout" class="a-logout"><span>🚪</span> Sign Out</a>
      </div>
    </aside>

    <main class="a-main">
      <header class="a-topbar">
        <div class="a-topbar-left">
          <h1 class="a-page-title">Add Product</h1>
          <p class="a-page-sub">Create a new product listing for the store.</p>
        </div>
        <div class="a-topbar-right">
          <div class="a-avatar">A</div>
        </div>
      </header>

      <div class="a-content">
        <div class="a-card" id="add-product-form">
          <form id="product-form">
            <div class="a-form-grid">
              <div class="a-form-group">
                <label for="name">Product Name</label>
                <input type="text" id="name" name="name" class="a-input" placeholder="e.g. Chase Bank Log" required />
              </div>
              <div class="a-form-group">
                <label for="category">Category</label>
                <input type="text" id="category" name="category" class="a-input" placeholder="e.g. Bank Logs" />
              </div>
              <div class="a-form-group">
                <label for="price">Price (USD)</label>
                <input type="number" id="price" name="price" step="0.01" min="0" class="a-input" placeholder="0.00" required />
              </div>
              <div class="a-form-group">
                <label for="stock">Stock (copies available)</label>
                <input type="number" id="stock" name="stock" class="a-input" value="1" min="-1" required />
                <small style="color:#9ca3af; font-size:0.85rem;">Enter -1 for unlimited stock.</small>
              </div>
            </div>
            <div class="a-form-group">
              <label for="description">Public Description</label>
              <textarea id="description" name="description" class="a-textarea" placeholder="What the customer sees before buying..." required></textarea>
            </div>
            <div class="a-form-group">
              <label for="product_data">Delivered Content <span style="font-weight:400; color:#9ca3af;">(hidden until purchased)</span></label>
              <textarea id="product_data" name="product_data" class="a-textarea" style="min-height:120px;" placeholder="The actual log data, credentials, or content delivered after purchase..." required></textarea>
            </div>
            <div style="display:flex; gap: 1rem; align-items: center;">
              <button type="submit" class="a-btn a-btn-primary">Save Product</button>
              <span id="product-form-msg" style="font-size:0.875rem; color: #10b981; display:none;">✓ Product created!</span>
            </div>
          </form>
        </div>
      </div>
    </main>
  </div>
</body>
</html>
