<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="../images/logo.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Settings — LogNest Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/admin.css" />
  <script src="../js/config.js"></script>
  <script defer src="../js/admin.js"></script>
</head>
<body>
  <div class="a-shell">
    <aside class="a-sidebar">
      <div class="a-brand">
        <img src="../images/logo.png" alt="LogNest" style="height:38px; width:auto; object-fit:contain;" /><span class="a-brand-tag" style="margin-left:0.4rem;">Admin</span>
      </div>
      <nav class="a-nav">
        <span class="a-nav-label">Main</span>
        <a href="index.html" class="a-nav-item"><span class="a-nav-icon">📊</span> Dashboard</a>
        <span class="a-nav-label">Products</span>
        <a href="add-product.html" class="a-nav-item"><span class="a-nav-icon">➕</span> Add Product</a>
        <a href="existing-products.html" class="a-nav-item"><span class="a-nav-icon">📂</span> All Products</a>
        <span class="a-nav-label">Management</span>
        <a href="orders.html" class="a-nav-item"><span class="a-nav-icon">🛒</span> Orders</a>
        
        <a href="refunded-logs.html" class="a-nav-item"><span class="a-nav-icon">↩️</span> Refunded Logs</a>
        <a href="users.html" class="a-nav-item"><span class="a-nav-icon">👥</span> Users</a>
        <a href="deposits.html" class="a-nav-item"><span class="a-nav-icon">💰</span> Deposits</a>
        <span class="a-nav-label">System</span>
        <a href="settings.html" class="a-nav-item active"><span class="a-nav-icon">⚙️</span> Settings</a>
      </nav>
      <div class="a-sidebar-footer">
        <a href="#" id="admin-logout" class="a-logout"><span>🚪</span> Sign Out</a>
      </div>
    </aside>

    <main class="a-main">
      <header class="a-topbar">
        <div class="a-topbar-left">
          <h1 class="a-page-title">Settings</h1>
          <p class="a-page-sub">Configure wallet addresses and platform preferences.</p>
        </div>
        <div class="a-topbar-right">
          <div class="a-avatar">A</div>
        </div>
      </header>

      <div class="a-content">
        <!-- Wallet Settings -->
        <div class="a-card">
          <h2 style="font-size:1rem; font-weight:700; margin-bottom: 1.25rem;">💳 Crypto Wallet Addresses</h2>
          <form id="admin-settings-form">
            <div class="a-form-grid">
              <div class="a-form-group">
                <label for="btc_wallet">Bitcoin (BTC) Wallet Address</label>
                <input type="text" id="btc_wallet" name="btc_wallet" class="a-input" placeholder="bc1q..." />
              </div>
              <div class="a-form-group">
                <label for="usdt_wallet">USDT (TRC20) Wallet Address</label>
                <input type="text" id="usdt_wallet" name="usdt_wallet" class="a-input" placeholder="T..." />
              </div>
            </div>
            <button type="submit" class="a-btn a-btn-primary">Save Settings</button>
          </form>
        </div>

        <!-- Change Password -->
        <div class="a-card">
          <h2 style="font-size:1rem; font-weight:700; margin-bottom: 1.25rem;">🔑 Change Admin Password</h2>
          <form id="change-password-form">
            <div class="a-form-grid">
              <div class="a-form-group">
                <label for="current_password">Current Password</label>
                <input type="password" id="current_password" name="current_password" class="a-input" placeholder="Enter current password" required autocomplete="current-password" />
              </div>
              <div class="a-form-group">
                <label for="new_password">New Password</label>
                <input type="password" id="new_password" name="new_password" class="a-input" placeholder="Min 8 characters" required autocomplete="new-password" />
              </div>
              <div class="a-form-group">
                <label for="confirm_password">Confirm New Password</label>
                <input type="password" id="confirm_password" name="confirm_password" class="a-input" placeholder="Repeat new password" required autocomplete="new-password" />
              </div>
            </div>
            <button type="submit" class="a-btn a-btn-primary" id="change-pw-btn">Update Password</button>
          </form>
        </div>

        <script>
          (function() {
            const API_BASE = window.__API_BASE__ || window.API_BASE || 'http://localhost:5000/api';
            const token    = localStorage.getItem('token');

            document.getElementById('change-password-form').addEventListener('submit', async (e) => {
              e.preventDefault();
              const btn     = document.getElementById('change-pw-btn');
              const current = document.getElementById('current_password').value;
              const next    = document.getElementById('new_password').value;
              const confirm = document.getElementById('confirm_password').value;

              if (next !== confirm) {
                adminToast('New passwords do not match.', 'error'); return;
              }
              if (next.length < 8) {
                adminToast('New password must be at least 8 characters.', 'error'); return;
              }

              btn.textContent = 'Updating...'; btn.disabled = true;
              try {
                const res  = await fetch(API_BASE + '/auth/change-password', {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                  body: JSON.stringify({ current_password: current, new_password: next })
                });
                const data = await res.json();
                if (data.success) {
                  adminToast('Password updated successfully!', 'success');
                  e.target.reset();
                } else {
                  adminToast(data.message || 'Failed to update password.', 'error');
                }
              } catch (err) {
                adminToast('Connection error. Try again.', 'error');
              } finally {
                btn.textContent = 'Update Password'; btn.disabled = false;
              }
            });
          })();
        </script>
      </div>
    </main>
  </div>
</body>
</html>
