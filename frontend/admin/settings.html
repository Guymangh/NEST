<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="../images/logo.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Settings — LogNest Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/admin.css" />
  <script src="../js/config.js"></script>
  <script defer src="../js/admin.js"></script>
</head>
<body>
  <div class="a-shell">
    <aside class="a-sidebar">
      <div class="a-brand">
        <img src="../images/logo.png" alt="LogNest" style="height:38px; width:auto; object-fit:contain;" /><span class="a-brand-tag" style="margin-left:0.4rem;">Admin</span>
      </div>
      <nav class="a-nav">
        <span class="a-nav-label">Main</span>
        <a href="/admin" class="a-nav-item"><span class="a-nav-icon">📊</span> Dashboard</a>
        <span class="a-nav-label">Products</span>
        <a href="/admin/add-product" class="a-nav-item"><span class="a-nav-icon">➕</span> Add Product</a>
        <a href="/admin/existing-products" class="a-nav-item"><span class="a-nav-icon">📂</span> All Products</a>
        <span class="a-nav-label">Management</span>
        <a href="/admin/orders" class="a-nav-item"><span class="a-nav-icon">🛒</span> Orders</a>
        
        <a href="/admin/refunded-logs" class="a-nav-item"><span class="a-nav-icon">↩️</span> Refunded Logs</a>
        <a href="/admin/users" class="a-nav-item"><span class="a-nav-icon">👥</span> Users</a>
        <a href="/admin/deposits" class="a-nav-item"><span class="a-nav-icon">💰</span> Deposits</a>
        <span class="a-nav-label">System</span>
        <a href="/admin/settings" class="a-nav-item active"><span class="a-nav-icon">⚙️</span> Settings</a>
      </nav>
      <div class="a-sidebar-footer">
        <a href="#" id="admin-logout" class="a-logout"><span>🚪</span> Sign Out</a>
      </div>
    </aside>

    <main class="a-main">
      <header class="a-topbar">
        <div class="a-topbar-left">
          <h1 class="a-page-title">Settings</h1>
          <p class="a-page-sub">Configure wallet addresses and platform preferences.</p>
        </div>
        <div class="a-topbar-right">
          <div class="a-avatar">A</div>
        </div>
      </header>

      <div class="a-content">


        <!-- Change Password -->
        <div class="a-card">
          <h2 style="font-size:1rem; font-weight:700; margin-bottom: 1.25rem;">🔑 Change Admin Password</h2>
          <form id="change-password-form">
            <div class="a-form-grid">
              <div class="a-form-group">
                <label for="current_password">Current Password</label>
                <input type="password" id="current_password" name="current_password" class="a-input" placeholder="Enter current password" required autocomplete="current-password" />
              </div>
              <div class="a-form-group">
                <label for="new_password">New Password</label>
                <input type="password" id="new_password" name="new_password" class="a-input" placeholder="Min 8 characters" required autocomplete="new-password" />
              </div>
              <div class="a-form-group">
                <label for="confirm_password">Confirm New Password</label>
                <input type="password" id="confirm_password" name="confirm_password" class="a-input" placeholder="Repeat new password" required autocomplete="new-password" />
              </div>
            </div>
            <button type="submit" class="a-btn a-btn-primary" id="change-pw-btn">Update Password</button>
          </form>
        </div>


    </main>
  </div>
</body>
</html>
