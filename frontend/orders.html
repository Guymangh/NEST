<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/images/logo.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Orders ŌĆō LogNest</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <script src="js/toast.js"></script>
  <script src="js/config.js"></script>
  <script src="js/nav.js"></script>
  <style>
    .orders-wrap { max-width: 860px; margin: 0 auto; padding: 0.6rem 1rem 2.5rem; }

    /* Header */
    .o-header { display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:0.75rem; margin-bottom:1.25rem; }
    .o-title   { font-size:1.35rem; font-weight:800; color:var(--primary-deep); letter-spacing:-0.3px; }
    .o-sub     { font-size:0.78rem; color:var(--text-muted); margin-top:0.1rem; }

    /* Stat row */
    .o-stats { display:flex; gap:0.65rem; margin-bottom:1.25rem; flex-wrap:wrap; }
    .o-stat {
      flex:1; min-width:120px;
      background:var(--bg-card); border:1px solid var(--border-soft); border-radius:10px;
      padding:0.7rem 1rem; display:flex; align-items:center; gap:0.65rem;
    }
    .o-stat-icon { font-size:1.1rem; flex-shrink:0; }
    .o-stat-label { font-size:0.65rem; font-weight:700; text-transform:uppercase; letter-spacing:.05em; color:var(--text-muted); }
    .o-stat-val   { font-size:1.05rem; font-weight:800; color:var(--primary-deep); line-height:1; margin-top:0.1rem; }

    /* Table card */
    .o-card {
      background:var(--bg-card); border:1px solid var(--border-soft);
      border-radius:12px; overflow:hidden; box-shadow:var(--shadow-soft);
    }

    /* Table */
    .o-table { width:100%; border-collapse:collapse; font-size:0.82rem; }
    .o-table th {
      padding:0.6rem 0.9rem; text-align:left;
      font-size:0.65rem; font-weight:700; text-transform:uppercase; letter-spacing:.06em;
      color:var(--primary-deep); background:var(--bg-accent);
      border-bottom:1px solid var(--border-soft);
    }
    .o-table td { padding:0.65rem 0.9rem; border-bottom:1px solid var(--border-soft); color:var(--text-main); vertical-align:middle; }
    .o-table tbody tr:last-child td { border-bottom:none; }
    .o-table tbody tr { cursor:pointer; transition:background .15s; }
    .o-table tbody tr:hover td { background:var(--bg-accent); }

    /* ID pill */
    .o-id {
      font-family:monospace; font-size:0.7rem; font-weight:700;
      background:var(--bg-accent); color:var(--primary-deep);
      padding:0.12rem 0.4rem; border-radius:4px;
    }

    /* Status badge */
    .o-badge {
      display:inline-flex; align-items:center; gap:0.25rem;
      padding:0.14rem 0.55rem; border-radius:99px;
      font-size:0.65rem; font-weight:700; text-transform:uppercase; letter-spacing:.04em;
      white-space:nowrap;
    }
    .ob-completed { background:rgba(22,163,74,.1); color:#15803d; border:1px solid rgba(22,163,74,.2); }
    .ob-refunded  { background:rgba(99,102,241,.1); color:#4338ca; border:1px solid rgba(99,102,241,.2); }
    .ob-pending   { background:rgba(217,119,6,.1);  color:#b45309; border:1px solid rgba(217,119,6,.2); }
    .ob-cancelled { background:rgba(185,28,28,.1);  color:#b91c1c; border:1px solid rgba(185,28,28,.2); }

    /* View btn */
    .o-view {
      font-size:0.72rem; font-weight:600; color:var(--primary);
      padding:0.25rem 0.6rem; border:1px solid var(--border-soft);
      border-radius:6px; text-decoration:none; background:var(--bg-card);
      display:inline-block; transition:all .18s;
    }
    .o-view:hover { border-color:var(--primary); background:var(--bg-accent); }

    /* Pagination bar */
    .o-pagination {
      display:flex; align-items:center; justify-content:space-between;
      padding:0.65rem 0.9rem; border-top:1px solid var(--border-soft);
      flex-wrap:wrap; gap:0.5rem;
    }
    .o-pg-info { font-size:0.75rem; color:var(--text-muted); }
    .o-pg-btns { display:flex; gap:0.4rem; align-items:center; }
    .o-pg-btn {
      padding:0.28rem 0.75rem; border-radius:7px;
      border:1px solid var(--border-soft); background:var(--bg-card);
      font-size:0.75rem; font-weight:600; cursor:pointer;
      color:var(--text-main); transition:all .18s; font-family:inherit;
    }
    .o-pg-btn:disabled { opacity:.38; cursor:not-allowed; }
    .o-pg-btn:not(:disabled):hover { border-color:var(--primary); color:var(--primary); background:var(--bg-accent); }
    .o-pg-label { font-size:0.75rem; font-weight:600; color:var(--text-muted); padding:0 0.2rem; }

    /* Empty */
    .o-empty { text-align:center; padding:3rem 1rem; }
    .o-empty-icon { font-size:2.2rem; margin-bottom:0.65rem; opacity:.5; }
    .o-empty h3 { font-size:1rem; color:var(--text-main); margin-bottom:0.3rem; }
    .o-empty p  { font-size:0.82rem; color:var(--text-muted); margin-bottom:1.1rem; }

    /* Dark mode compat */
    body.dark-mode .o-stat  { background:var(--bg-card); }
    body.dark-mode .o-card  { background:var(--bg-card); }
    body.dark-mode .o-table th { background:var(--bg-accent); }
    body.dark-mode .o-table tbody tr:hover td { background:var(--bg-accent); }
    body.dark-mode .o-view  { background:var(--bg-card); }
    body.dark-mode .o-pg-btn { background:var(--bg-card); }

    /* ŌöĆŌöĆ Mobile: table ?Æ stacked cards ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ */
    @media (max-width: 640px) {
      .o-stats { gap: 0.5rem; }
      .o-stat  { min-width: 0; padding: 0.6rem 0.75rem; }
      .o-stat-val { font-size: 0.95rem; }

      /* Hide normal thead */
      .o-table thead { display: none; }

      /* Each row becomes a card */
      .o-table tbody tr {
        display: block;
        border-bottom: 1px solid var(--border-soft);
        padding: 0.75rem 0.9rem;
        position: relative;
      }
      .o-table tbody tr:last-child { border-bottom: none; }

      /* Each cell becomes a flex row: label on left, value on right */
      .o-table tbody td {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0.22rem 0;
        border: none;
        font-size: 0.8rem;
        max-width: 100% !important;
        white-space: normal !important;
      }

      /* Hide the "View ?Æ" cell ŌĆö show as bottom link instead */
      .o-table tbody td:last-child {
        justify-content: center;
        margin-top: 0.4rem;
        padding-top: 0.5rem;
        border-top: 1px solid var(--border-soft);
      }
      .o-table tbody td:last-child a.o-view {
        width: 100%; text-align: center; padding: 0.4rem 0;
        display: block; border-radius: 8px;
        background: var(--bg-accent); border-color: var(--primary);
        color: var(--primary); font-weight: 700;
      }

      /* Label injected via data-label */
      .o-table tbody td[data-label]::before {
        content: attr(data-label);
        font-size: 0.65rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: .05em;
        color: var(--text-muted);
        flex-shrink: 0;
        margin-right: 0.5rem;
      }

      /* Pagination stacks */
      .o-pagination { flex-direction: column; align-items: flex-start; gap: 0.4rem; }
      .o-pg-btns   { width: 100%; justify-content: space-between; }
    }
  </style>
</head>
<body data-require-auth="true">
  <header class="header">
    <div class="container nav-container">
      <a href="index.html" class="logo">
        <img src="images/logo.png" alt="Logo" class="nav-logo" onerror="this.style.display='none'" />
      </a>
      <nav><ul class="nav-list" id="main-nav"></ul></nav>
    </div>
  </header>

  <main class="main-content page-tight">
    <div class="orders-wrap">

      <!-- Page header -->
      <div class="o-header">
        <div>
          <h1 class="o-title">My Orders</h1>
          <p class="o-sub">Track purchases and access your digital assets.</p>
        </div>
        <a href="store.html" class="btn btn-primary" style="font-size:0.8rem;padding:0.5rem 1.1rem;">+ Store</a>
      </div>

      <!-- Stats -->
      <div class="o-stats">
        <div class="o-stat">
          <span class="o-stat-icon">­¤ō”</span>
          <div>
            <div class="o-stat-label">Orders</div>
            <div class="o-stat-val" id="stat-total">ŌĆö</div>
          </div>
        </div>
        <div class="o-stat">
          <span class="o-stat-icon">­¤ÆĄ</span>
          <div>
            <div class="o-stat-label">Spent</div>
            <div class="o-stat-val" id="stat-spent" style="color:#15803d;">ŌĆö</div>
          </div>
        </div>
        <div class="o-stat">
          <span class="o-stat-icon">­¤Æ│</span>
          <div>
            <div class="o-stat-label">Balance</div>
            <div class="o-stat-val" id="stat-balance" style="color:var(--primary);">ŌĆö</div>
          </div>
        </div>
      </div>

      <!-- Table -->
      <div class="o-card">
        <div style="overflow-x:auto;">
          <table class="o-table">
            <thead>
              <tr>
                <th>Order ID</th>
                <th>Product</th>
                <th>Qty</th>
                <th>Date</th>
                <th>Amount</th>
                <th>Status</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="orders-tbody">
              <tr><td colspan="7" style="text-align:center;padding:2.5rem;color:var(--text-muted);">Loadingģ</td></tr>
            </tbody>
          </table>
        </div>

        <!-- Pagination -->
        <div class="o-pagination">
          <span class="o-pg-info" id="pg-info"></span>
          <div class="o-pg-btns" id="pg-btns"></div>
        </div>
      </div>

    </div>
  </main>

  <footer class="footer">
    <div class="container"><p>&copy; 2026 LogNest. All rights reserved.</p></div>
  </footer>

  <script>
    const API_BASE = window.API_BASE || 'http://localhost:5000/api';
    const PAGE_SIZE = 8;
    let allOrders   = [];

    const STATUS = {
      completed: { cls:'ob-completed', dot:'?Å', label:'Completed' },
      refunded:  { cls:'ob-refunded',  dot:'?®', label:'Refunded'  },
      pending:   { cls:'ob-pending',   dot:'?É', label:'Pending'   },
      cancelled: { cls:'ob-cancelled', dot:'?', label:'Cancelled' },
    };

    function renderPage(page) {
      const tbody  = document.getElementById('orders-tbody');
      const info   = document.getElementById('pg-info');
      const btns   = document.getElementById('pg-btns');
      const total  = allOrders.length;
      const pages  = Math.max(1, Math.ceil(total / PAGE_SIZE));
      const start  = (page - 1) * PAGE_SIZE;
      const rows   = allOrders.slice(start, start + PAGE_SIZE);

      info.textContent = `${start + 1}ŌĆō${Math.min(start + PAGE_SIZE, total)} of ${total}`;

      btns.innerHTML = `
        <button class="o-pg-btn" onclick="renderPage(${page-1})" ${page<=1?'disabled':''}>?É Prev</button>
        <span class="o-pg-label">Page ${page} / ${pages}</span>
        <button class="o-pg-btn" onclick="renderPage(${page+1})" ${page>=pages?'disabled':''}>Next ?Æ</button>
      `;

      if (!rows.length) {
        tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;padding:2rem;color:var(--text-muted);">No orders found.</td></tr>`;
        return;
      }

      tbody.innerHTML = rows.map(o => {
        const s    = STATUS[o.status] || { cls:'ob-pending', dot:'?Å', label: o.status };
        const name = o.product_name || 'N/A';
        const show = name.length > 42 ? name.slice(0, 39) + 'ģ' : name;
        const date = new Date(o.created_at).toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
        return `
          <tr onclick="window.location='order-detail.html?id=${o.id}'">
            <td data-label="Order ID"><span class="o-id">#${o.id.slice(0,8).toUpperCase()}</span></td>
            <td data-label="Product" style="max-width:210px;" title="${name}">${show}</td>
            <td data-label="Qty" style="text-align:center;color:var(--text-muted);">${o.quantity}</td>
            <td data-label="Date" style="white-space:nowrap;color:var(--text-muted);">${date}</td>
            <td data-label="Amount" style="font-weight:700;color:#15803d;">$${parseFloat(o.total).toFixed(2)}</td>
            <td data-label="Status"><span class="o-badge ${s.cls}">${s.dot} ${s.label}</span></td>
            <td onclick="event.stopPropagation()">
              <a href="order-detail.html?id=${o.id}" class="o-view">View ?Æ</a>
            </td>
          </tr>`;
      }).join('');
    }

    async function loadOrders() {
      const token = localStorage.getItem('token');
      if (!token) { window.location.href = 'login.html'; return; }

      const user = JSON.parse(localStorage.getItem('user') || 'null');
      if (user) document.getElementById('stat-balance').textContent = '$' + parseFloat(user.balance || 0).toFixed(2);

      try {
        const res  = await fetch(`${API_BASE}/orders/my-orders?limit=200`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        const data = await res.json();
        if (!data.success) { toast(data.message || 'Failed to load orders', 'error'); return; }

        allOrders = data.orders || [];

        document.getElementById('stat-total').textContent = allOrders.length;
        const spent = allOrders.reduce((a, o) => a + parseFloat(o.total || 0), 0);
        document.getElementById('stat-spent').textContent = '$' + spent.toFixed(2);

        if (!allOrders.length) {
          document.getElementById('orders-tbody').innerHTML = `
            <tr><td colspan="7">
              <div class="o-empty">
                <div class="o-empty-icon">­¤ō”</div>
                <h3>No orders yet</h3>
                <p>Browse the store to make your first purchase.</p>
                <a href="store.html" class="btn btn-primary" style="font-size:0.82rem;padding:0.5rem 1.1rem;">Browse Store</a>
              </div>
            </td></tr>`;
          document.getElementById('pg-info').textContent = '0 orders';
          return;
        }

        renderPage(1);
      } catch (err) {
        console.error(err);
        toast('Server error loading orders', 'error');
      }
    }

    loadOrders();
  </script>
</body>
</html>
